server {
    listen 443 ssl;
    server_name hobvmisap57;

    ssl_certificate     /etc/ssl/certs/dash-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/dash-selfsigned.key;

    proxy_connect_timeout 600; # Time to establish a connection (usually fine at 60s)
    proxy_send_timeout    600; # Time for sending a request to the backend
    proxy_read_timeout    600; # <--- THIS IS THE MOST IMPORTANT ONE (5 minutes)

    location / {
        proxy_pass http://[::1]:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location /notebook/ {
        proxy_pass http://127.0.0.1:9999/tree;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location /osrm/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location /endpoint/ {
        proxy_pass http://127.0.0.1:8000/; # <-- ADD TRAILING SLASH HERE
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    location /optimizer/ {
        proxy_pass http://127.0.0.1:8060; # <-- ADD TRAILING SLASH HERE
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name hobvmisap57;
    return 301 https://$host$request_uri;
}
