services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire_demo3_v2_backend
    env_file: .env
    ports: ["8000:8000"]
    volumes:
      - ./storage:/data/storage
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      BASE_DIR: /app
      DATA_DIR: /app/data
      LOGS_DIR: /app/logs
      DATABASE_URL: sqlite:////data/storage/app.db
      STORAGE_ROOT: /data/storage
      # Point at an OSRM running on the docker host (override OSRM_HOST/OSRM_PORT
      # in .env if your OSRM lives elsewhere). Avoids shipping a duplicate
      # osrm-routed container when the host already runs one.
      OSRM_HOST: ${OSRM_HOST:-host.docker.internal}
      OSRM_PORT: ${OSRM_PORT:-8085}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fire_demo3_v2_worker
    env_file: .env
    volumes:
      - ./storage:/data/storage
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      BASE_DIR: /app
      DATA_DIR: /app/data
      LOGS_DIR: /app/logs
      DATABASE_URL: sqlite:////data/storage/app.db
      STORAGE_ROOT: /data/storage
      OSRM_HOST: ${OSRM_HOST:-host.docker.internal}
      OSRM_PORT: ${OSRM_PORT:-8085}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
    command: python -m worker.main
